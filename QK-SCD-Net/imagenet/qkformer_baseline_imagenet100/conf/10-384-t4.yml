config:
  data_path: '/root/lanyun-tmp/lanyun-tmp/data/_imagenet100_kaggle_tmp'
  model: QKFormer_10_384
  nb_classes: 100
  input_size: 224
  time_step: 4

  batch_size: 16
  accum_iter: 4
  epochs: 200

  blr: 0.0054
  min_lr: 1.0e-6
  warmup_epochs: 5
  weight_decay: 0.05
  layer_decay: 1.0
  drop_path: 0.1

  aa: rand-m9-mstd0.5-inc1
  color_jitter: 0.1
  smoothing: 0.1
  reprob: 0.25
  remode: pixel
  recount: 1

  mixup: 0.1
  cutmix: 0.0
  mixup_prob: 1.0
  mixup_switch_prob: 0.5
  mixup_mode: batch

  output_dir: ./output/imagenet100_qkformer_10_384_t4_baseline
  log_dir: ./output/imagenet100_qkformer_10_384_t4_baseline
  num_workers: 10
  pin_mem: true
  device: cuda
  seed: 42
  finetune: ''
  resume: ''