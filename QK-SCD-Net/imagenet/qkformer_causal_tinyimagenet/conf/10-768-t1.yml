  mixup_mode: batch

  output_dir: ./output/tiny_imagenet_qkformer_10_768_T1_maxformer_style
  log_dir: ./output/tiny_imagenet_qkformer_10_768_T1_maxformer_style
  num_workers: 10
  pin_mem: true
  device: cuda
  seed: 42
  finetune: ''
  resume: ''