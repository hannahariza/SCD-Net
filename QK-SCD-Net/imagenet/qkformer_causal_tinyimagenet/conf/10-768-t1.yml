config:
  data_path: '/root/lanyun-tmp/lanyun-tmp/data/tiny-iamgenet/tiny-imagenet-200'
  model: QKFormer_10_768
  nb_classes: 200
  input_size: 64
  time_step: 1

  batch_size: 128
  accum_iter: 1
  epochs: 300

  blr: 0.0012
  min_lr: 1.0e-5
